        <title>Unsupported Browser | Willy Horizont</title>

    <body>
        <main>
            <div data-display="flex" style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; row-gap: 8px; background-color: var(--safe-background-color-1); color: var(--safe-text-color-1);">
                <h1 style="text-align: center;">Unsupported Web Browser</h1>
                <h2>⛔ Access Denied ⛔</h2>
                <p style="text-align: center;">Your <strong>web browser</strong> is not supported.</p>
                <p style="text-align: center;">Please use <strong>latest stable Google Chrome</strong> to continue.</p>
                <a href="https://www.google.com/chrome/" target="_blank" rel="noopener noreferrer" style="color:blue;">Download Chrome</a>
            </div>
        </main>
        <script>
            (async () => {
                if (!WillyHorizont.UtilsWeb) return;

                const isUserUsingChromiumBasedWebBrowser = WillyHorizont.UtilsWeb.checkIsUserUsingChromiumBasedWebBrowser();
                // console.log({ isUserUsingChromiumBasedWebBrowser });

                if (isUserUsingChromiumBasedWebBrowser) {
                    window.location.href = "/";
                    return;
                }

                const isUserUsingLatestStableChromiumBasedWebBrowser = await WillyHorizont.UtilsWeb.checkIsUserUsingMinimumStableChromiumBasedWebBrowser();
                // console.log({ isUserUsingLatestStableChromiumBasedWebBrowser });

                if (isUserUsingLatestStableChromiumBasedWebBrowser) {
                    window.location.href = "/";
                    return;
                }
            })();
        </script>
    </body>
