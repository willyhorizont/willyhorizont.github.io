            .separator-input {
                border: 1px solid var(--light-border-color); padding: 16px 8px; outline: none; max-width: 120px;

                padding: 4px; width: 100%; display: flex; flex-direction: column; align-items: flex-end;

    <body>
        <header>
        </header>
        <main>
            <div style="padding: 8px;">
                <h1 style="text-align: center;">Replace Any Line Break</h1>
                <div style="padding: 4px; width: 100%; display: flex; flex-direction: column; row-gap: 8px;">
                    <div class="replace-any-line-break-card">
                        <h2 class="replace-any-line-break-card-title">Replace with:</h2>
                        <input id="separator-input" class="separator-input" name="separator-input" placeholder="\n\n" type="text" />
                    </div>
                    <div class="replace-any-line-break-card">
                        <h2 class="replace-any-line-break-card-title">Input:</h2>
                        <textarea id="input-of-replace-any-line-break-textarea" class="replace-any-line-break-textarea" rows="12" cols="50"></textarea>
                    </div>
                    <div class="replace-any-line-break-card">
                        <h2 class="replace-any-line-break-card-title">Output:</h2>
                        <textarea id="output-of-replace-any-line-break-textarea" class="replace-any-line-break-textarea" rows="12" cols="50"></textarea>
                    </div>
                </div>
                <div id="placeholder-link"></div>
            </div>
        </main>
        <footer>
        </footer>

        <script src="../../component/component-user-web-browser-checker.js"></script>

        <script>
            const defaultOutputStringSeparator = `" "`;

            function processInputData(inputData) {
                const outputSeparatorValue = document.getElementById("separator-input").value.trim().slice(1, -1);
                const outputStringSeparator = WillyHorizont.Utils.parseEscapeSequence(outputSeparatorValue || defaultOutputStringSeparator);
                const outputString = WillyHorizont.Utils.replaceAnyLineBreak(inputData, outputStringSeparator);
                return ({ outputStringSeparator, outputString });
            }

            function renderOutputData({ outputStringSeparator, outputString }) {
                document.getElementById("output-of-replace-any-line-break-textarea").value = outputString;
            }

            function handleEventBlurRawTextTextArea(event) {
                const htmlElementInputOfReplaceAnyLineBreakTextareaValueTrimmed = event.target.value.trim();
                if (htmlElementInputOfReplaceAnyLineBreakTextareaValueTrimmed === "") {
                    event.preventDefault();
                    return;
                }

                renderOutputData(processInputData(htmlElementInputOfReplaceAnyLineBreakTextareaValueTrimmed));

                event.preventDefault();
            }

            const htmlElementInputOfReplaceAnyLineBreakTextarea = document.getElementById("input-of-replace-any-line-break-textarea");

            htmlElementInputOfReplaceAnyLineBreakTextarea.addEventListener("blur", handleEventBlurRawTextTextArea);

            document.getElementById("separator-input").value = defaultOutputStringSeparator;
            const initialData = (`width: 60vw;
        height: 60vh;
        overflow: auto;`);
            htmlElementInputOfReplaceAnyLineBreakTextarea.value = initialData;
            renderOutputData(processInputData(initialData));
        </script>

        <script src="../../component/component-donation-platforms.js"></script>
    </body>
