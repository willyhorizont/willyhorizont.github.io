        <style>
            .grid-table-container {
                /* width: 60vw; */
                /* height: 60vh; */
                width: calc(100% - var(--scroll-width));
                min-height: 10vw;
                max-height: var(--max-height, 10vw);
                overflow: auto;

                position: relative;
            }

            .grid-table {
                display: grid;
                grid-auto-rows: var(--row-height);
                min-width: max-content;
            }

            .grid-table-cell {
                border: 1px solid #ccc;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #fff;
            }

            .grid-table-cell input {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                border: none;
                outline: none;
                text-align: center;
            }

            .grid-table-cell input:focus {
                background: #e3f2fd;
            }

            /* HEADER STICKY */
            .grid-table-sticky-header-row {
                position: sticky;
                top: 0;
                background: #f5f5f5;
                z-index: 1;
            }

            /* LEFT COLUMN */
            .grid-table-number-column {
                position: sticky;
                left: 0;
                background: #f5f5f5;
                z-index: 0;
            }

            .grid-table-corner {
                position: sticky;
                left: 0;
                z-index: 2;
                background: #ddd;
            }

            /* SCORE ROW (BOTTOM) */
            .score-row {
                background: #222;
                color: #fff;
                font-weight: bold;
            }

            /* button */
            .add-button {
                cursor: pointer;
                background: #fafafa;
                font-weight: bold;
            }
            .add-button:hover {
                background: #e0e0e0;
            }

            /* html[data-theme="dark"] {
            } */
        </style>

        </header>
        <main>
            <div style="padding: 8px;">
                <h1 style="text-align: center;">Score Counter</h1>
                <div style="padding: 4px; width: 100%; display: flex; flex-direction: column; align-items: flex-end;">

                        <div id="grid-table" class="grid-table"></div>
                    </div>
                </div>

            </div>
        </main>

        <script>
            document.querySelector("header").style.setProperty("z-index", "3");

            WillyHorizont.UtilsWeb.setupViewportHeightFromViewportWidthListener();

            let columnCount = 1;
            let rowCount = 1;
            if (WillyHorizont.UtilsWeb.IS_IN_DEVELOPMENT_MODE || (dataFromLocalStorageKalenderLiburAdvisorTimestamp !== dataTimestamp)) {
                columnCount = 20;
                rowCount = 80;
            }

            function getStyleGridTemplateColumns(columnCount) {
                return (`60px repeat(${columnCount}, 120px) 80px`);
            }

            function getColumnName(columnIndexZeroBased) {
                const charCode = {
                    "A": 65,
                };
                const azLength = 26;
                let columnName = "";
                let currentIndexOneBased = (columnIndexZeroBased + 1);
                while (currentIndexOneBased > 0) {
                    const remainderZeroToTwentyFive = ((currentIndexOneBased - 1) % azLength);
                    const currentCharacter = String.fromCharCode(charCode["A"] + remainderZeroToTwentyFive);
                    columnName = `${currentCharacter}${columnName}`;
                    currentIndexOneBased = Math.floor((currentIndexOneBased - 1) / azLength);
                }
                return columnName;
            }

            function createHtmlElementNumberColumnHeader() {
                const htmlElementNumberColumnHeader = document.createElement("div");
                htmlElementNumberColumnHeader.setAttribute("class", "grid-table-cell grid-table-corner grid-table-sticky-header-row");
                htmlElementNumberColumnHeader.textContent = "#";
                return htmlElementNumberColumnHeader;
            }

            function createHtmlElementHeaderRowContainer(columnIndexZeroBased) {
                const htmlElementHeaderRowContainer = document.createElement("div");
                htmlElementHeaderRowContainer.setAttribute("class", "grid-table-cell grid-table-sticky-header-row");

                const htmlElementHeaderRowInput = document.createElement("input");
                const columnName = getColumnName(columnIndexZeroBased);
                htmlElementHeaderRowInput.value = columnName
                htmlElementHeaderRowInput.type = "text";
                htmlElementHeaderRowInput.name = `cell-header-input-${columnName}`;
                htmlElementHeaderRowInput.setAttribute("autocomplete", "off");

                htmlElementHeaderRowContainer.appendChild(htmlElementHeaderRowInput);
                return htmlElementHeaderRowContainer;
            }

            function createHtmlElementHeaderRowCellAddButton() {
                const htmlElementGrid = document.getElementById("grid-table");

                const htmlElementHeaderRowCellAddButton = document.createElement("div");
                htmlElementHeaderRowCellAddButton.setAttribute("class", "grid-table-cell grid-table-sticky-header-row add-button");
                htmlElementHeaderRowCellAddButton.setAttribute("data-right-most-cell", "header-row-cell-add-button");
                htmlElementHeaderRowCellAddButton.textContent = "+";
                htmlElementHeaderRowCellAddButton.onclick = function () {
                    columnCount += 1;
                    // console.log({ columnName: getColumnName(columnCount - 1), columnCount, rowCount, eventName: "header-row-cell-add-button" });
                    htmlElementGrid.insertBefore(createHtmlElementHeaderRowContainer(columnCount - 1), htmlElementGrid.querySelector('[data-right-most-cell="header-row-cell-add-button"]'));

                    htmlElementGrid.querySelectorAll('[data-right-most-cell="data-row"]').forEach((htmlElementDataRowEmptyColumn, rowIndexZeroBased) => {
                        htmlElementGrid.insertBefore(createHtmlElementCellInputContainer((rowIndexZeroBased + 1), (columnCount - 1)), htmlElementDataRowEmptyColumn);
                    });

                    const htmlElementBottomMostRow = createHtmlElementEmptyContainer();
                    htmlElementBottomMostRow.setAttribute("data-bottom-most-cell", "add-row");
                    htmlElementGrid.insertBefore(htmlElementBottomMostRow, htmlElementGrid.querySelector('[data-bottom-right-most-cell="add-row"]'));

                    const htmlElementScoreColumnCell = createHtmlElementScoreColumnCell(columnCount - 1);
                    htmlElementScoreColumnCell.textContent = 0;
                    htmlElementGrid.insertBefore(htmlElementScoreColumnCell, htmlElementGrid.querySelector('[data-right-most-cell="score-row"]'));
                    
                    htmlElementGrid.style.gridTemplateColumns = getStyleGridTemplateColumns(columnCount);
                }
                return htmlElementHeaderRowCellAddButton;
            }

            function appendHeaderRow() {
                const htmlElementGrid = document.getElementById("grid-table");
                
                htmlElementGrid.appendChild(createHtmlElementNumberColumnHeader());

                for (let columnIndexZeroBased = 0; (columnIndexZeroBased < columnCount); columnIndexZeroBased += 1) {
                    htmlElementGrid.appendChild(createHtmlElementHeaderRowContainer(columnIndexZeroBased));
                }

                htmlElementGrid.appendChild(createHtmlElementHeaderRowCellAddButton());
            }

            function createHtmlElementNumberColumn(rowIndexOneBased) {
                const htmlElementNumberColumn = document.createElement("div");
                htmlElementNumberColumn.setAttribute("class", "grid-table-cell grid-table-number-column");
                htmlElementNumberColumn.textContent = rowIndexOneBased;
                return htmlElementNumberColumn;
            }

            function createHtmlElementCellInputContainer(rowIndexOneBased, columnIndexZeroBased) {
                const htmlElementCellInputContainer = document.createElement("div");
                htmlElementCellInputContainer.setAttribute("class", "grid-table-cell");

                const htmlElementCellInput = document.createElement("input");
                htmlElementCellInput.type = "text";
                htmlElementCellInput.name = `cell-input-${getColumnName(columnIndexZeroBased)}${rowIndexOneBased}`;
                htmlElementCellInput.setAttribute("data-row-index-one-based", rowIndexOneBased);
                htmlElementCellInput.setAttribute("data-column-index-zero-based", columnIndexZeroBased);
                htmlElementCellInput.setAttribute("autocomplete", "off");

                htmlElementCellInput.addEventListener("input", updateScore); // TODO

                htmlElementCellInputContainer.appendChild(htmlElementCellInput);
                return htmlElementCellInputContainer;
            }

            function createHtmlElementEmptyContainer() {
                const htmlElementEmptyContainer = document.createElement("div");
                htmlElementEmptyContainer.setAttribute("class", "grid-table-cell");
                return htmlElementEmptyContainer;
            }

            function appendDataRow() {
                const htmlElementGrid = document.getElementById("grid-table");

                for (let rowIndexOneBased = 1; (rowIndexOneBased <= rowCount); rowIndexOneBased += 1) {
                    htmlElementGrid.appendChild(createHtmlElementNumberColumn(rowIndexOneBased));

                    for (let columnIndexZeroBased = 0; (columnIndexZeroBased < columnCount); columnIndexZeroBased += 1) {
                        htmlElementGrid.appendChild(createHtmlElementCellInputContainer(rowIndexOneBased, columnIndexZeroBased));
                    }

                    const htmlElementRightMostColumn = createHtmlElementEmptyContainer();
                    htmlElementRightMostColumn.setAttribute("data-right-most-cell", "data-row");
                    htmlElementGrid.appendChild(htmlElementRightMostColumn);
                }
            }

            function createHtmlElementNumberColumnCellAddButton() {
                const htmlElementNumberColumnCellAddButton = document.createElement("div");
                htmlElementNumberColumnCellAddButton.setAttribute("class", "grid-table-cell grid-table-number-column add-button");
                htmlElementNumberColumnCellAddButton.setAttribute("data-bottom-most-cell", "number-collumn-cell-add-button");
                htmlElementNumberColumnCellAddButton.textContent = "+";
                htmlElementNumberColumnCellAddButton.onclick = function () {
                    rowCount += 1;
                    // console.log({ columnName: getColumnName(columnCount), columnCount, rowCount, eventName: "number-collumn-cell-add-button" });
                    
                    const htmlElementGrid = document.getElementById("grid-table");

                    const newRows = []
                    newRows.push(createHtmlElementNumberColumn(rowCount));

                    for (let columnIndexZeroBased = 0; (columnIndexZeroBased < htmlElementGrid.querySelectorAll('[data-bottom-most-cell="add-row"]').length); columnIndexZeroBased += 1) {
                        newRows.push(createHtmlElementCellInputContainer(rowCount, columnIndexZeroBased));
                    }

                    const htmlElementRightMostColumn = createHtmlElementEmptyContainer();
                    htmlElementRightMostColumn.setAttribute("data-right-most-cell", "data-row");
                    newRows.push(htmlElementRightMostColumn);

                    // htmlElementGrid.querySelector('[data-bottom-most-cell="number-collumn-cell-add-button"]').before(...newRows);
                    this.before(...newRows);

                    htmlElementGrid.style.gridTemplateColumns = getStyleGridTemplateColumns(columnCount);
                }
                return htmlElementNumberColumnCellAddButton;
            }

            function appendAddRow() {
                const htmlElementGrid = document.getElementById("grid-table");

                htmlElementGrid.appendChild(createHtmlElementNumberColumnCellAddButton());

                for (let columnIndexZeroBased = 0; (columnIndexZeroBased < columnCount); columnIndexZeroBased += 1) {
                    const htmlElementBottomMostRow = createHtmlElementEmptyContainer();
                    htmlElementBottomMostRow.setAttribute("data-bottom-most-cell", "add-row");
                    htmlElementGrid.appendChild(htmlElementBottomMostRow);
                }

                const htmlElementRightMostColumn = createHtmlElementEmptyContainer();
                htmlElementRightMostColumn.setAttribute("data-bottom-right-most-cell", "add-row");
                htmlElementGrid.appendChild(htmlElementRightMostColumn);
            }

            function createHtmlElementScoreColumnHeader() {
                const htmlElementScoreColumnHeader = document.createElement("div");
                htmlElementScoreColumnHeader.setAttribute("class", "grid-table-cell grid-table-number-column score-row");
                htmlElementScoreColumnHeader.textContent = "Σ";
                return htmlElementScoreColumnHeader;
            }

            function createHtmlElementScoreColumnCell(columnIndexZeroBased) {
                const htmlElementScoreColumnCell = document.createElement("div");
                htmlElementScoreColumnCell.setAttribute("class", "grid-table-cell score-row");
                htmlElementScoreColumnCell.setAttribute("data-score-column", columnIndexZeroBased);
                return htmlElementScoreColumnCell;
            }

            function createHtmlElementScoreColumnCellEmpty() {
                const htmlElementScoreColumnCellEmpty = document.createElement("div");
                htmlElementScoreColumnCellEmpty.setAttribute("class", "grid-table-cell score-row");
                return htmlElementScoreColumnCellEmpty;
            }

            function appendScoreRow() {
                const htmlElementGrid = document.getElementById("grid-table");

                htmlElementGrid.appendChild(createHtmlElementScoreColumnHeader());

                for (let columnIndexZeroBased = 0; (columnIndexZeroBased < columnCount); columnIndexZeroBased += 1) {
                    htmlElementGrid.appendChild(createHtmlElementScoreColumnCell(columnIndexZeroBased));
                }

                const htmlElementRightMostColumn = createHtmlElementScoreColumnCellEmpty();
                htmlElementRightMostColumn.setAttribute("data-right-most-cell", "score-row");
                htmlElementGrid.appendChild(htmlElementRightMostColumn);
            }

            function renderMainContent() {
                const htmlElementGrid = document.getElementById("grid-table");
                htmlElementGrid.innerHTML = "";
                htmlElementGrid.style.gridTemplateColumns = getStyleGridTemplateColumns(columnCount);

                appendHeaderRow();
                appendDataRow();
                appendAddRow();
                appendScoreRow();
                updateScore();
            }

            function updateScore() {
                for (let columnIndexZeroBased = 0; (columnIndexZeroBased < columnCount); columnIndexZeroBased += 1) {
                    let scoreSummary = 0;

                    for (let rowIndexOneBased = 1; (rowIndexOneBased <= rowCount); rowIndexOneBased += 1) {
                        const htmlElementCellInput = document.querySelector(`input[data-row-index-one-based="${rowIndexOneBased}"][data-column-index-zero-based="${columnIndexZeroBased}"]`);

                        const htmlElementCellInputValue = parseFloat(htmlElementCellInput?.value);
                        if (WillyHorizont.Utils.checkIsNumeric(htmlElementCellInputValue)) scoreSummary += htmlElementCellInputValue;
                    }

                    const htmlElementScoreColumnCell = document.querySelector(`[data-score-column="${columnIndexZeroBased}"]`);
                    if (htmlElementScoreColumnCell) htmlElementScoreColumnCell.textContent = scoreSummary;
                }
            }

            renderMainContent();
        </script>
