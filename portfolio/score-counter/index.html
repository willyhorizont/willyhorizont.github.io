        <style>
            .grid-table-container {
                /* width: 60vw; */
                /* height: 60vh; */
                width: calc(100% - var(--scroll-width));
                min-height: 10vw;
                max-height: var(--max-height, 10vw);
                overflow: auto;

                position: relative;
            }

            .grid-table {
                display: grid;
                grid-auto-rows: var(--row-height);
                min-width: max-content;
            }

            .grid-table-cell {
                border: 1px solid #ccc;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #fff;
            }

            .grid-table-cell input {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                border: none;
                outline: none;
                text-align: center;
            }

            .grid-table-cell input:focus {
                background: #e3f2fd;
            }

            /* HEADER STICKY */
            .grid-table-sticky-header-row {
                position: sticky;
                top: 0;
                background: #f5f5f5;
                z-index: 1;
            }

            /* LEFT COLUMN */
            .grid-table-number-column {
                position: sticky;
                left: 0;
                background: #f5f5f5;
                z-index: 0;
            }

            .grid-table-corner {
                position: sticky;
                left: 0;
                z-index: 2;
                background: #ddd;
            }

            /* SCORE ROW (BOTTOM) */
            .score-row {
                background: #222;
                color: #fff;
                font-weight: bold;
            }

            /* button */
            .add-button {
                cursor: pointer;
                background: #fafafa;
                font-weight: bold;
            }
            .add-button:hover {
                background: #e0e0e0;
            }

            /* html[data-theme="dark"] {
            } */
        </style>

        <script>
            document.querySelector("header").style.setProperty("z-index", "3");

            WillyHorizont.UtilsWeb.setupViewportHeightFromViewportWidthListener();

            const elementForPlusButtonToFindClassListItemPrefix = "element-for-plus-button-to-find";
            const elementForPlusButtonToFindClassList = {
                "add-horizontal-cell-plus-button": `${elementForPlusButtonToFindClassListItemPrefix}-add-horizontal-cell-plus-button`,
                "horizontal-blank-cells": `${elementForPlusButtonToFindClassListItemPrefix}-horizontal-blank-cells`,
                "add-vertical-cell-plus-button": `${elementForPlusButtonToFindClassListItemPrefix}-add-vertical-cell-plus-button`,
                "vertical-blank-cells": `${elementForPlusButtonToFindClassListItemPrefix}-vertical-blank-cells`,
                "plus-button-joint-blank-cell": `${elementForPlusButtonToFindClassListItemPrefix}-plus-button-joint-blank-cell`,
                "score-rows-blank-cell": `${elementForPlusButtonToFindClassListItemPrefix}-score-rows-blank-cell`,
            };

            const LOCAL_STORAGE_KEY_COLUMN = "score-counter-column";
            const LOCAL_STORAGE_KEY_ROW = "score-counter-row";
            const initialColumnCount = (WillyHorizont.UtilsWeb.IS_IN_DEVELOPMENT_MODE ? 20 : 1);
            const initialRowCount = (WillyHorizont.UtilsWeb.IS_IN_DEVELOPMENT_MODE ? 80 : 1);
            const getColumnCount = () => (parseInt(localStorage.getItem(LOCAL_STORAGE_KEY_COLUMN), 10) || initialColumnCount);
            const getRowCount = () => (parseInt(localStorage.getItem(LOCAL_STORAGE_KEY_ROW), 10) || initialRowCount);
            const setColumnCount = (newColumnCount) => localStorage.setItem(LOCAL_STORAGE_KEY_COLUMN, newColumnCount);
            const setRowCount = (newRowCount) => localStorage.setItem(LOCAL_STORAGE_KEY_ROW, newRowCount);
            const getStyleGridTemplateColumns = () => (`60px repeat(${getColumnCount()}, 120px) 80px`);

            function resetGame() {
                setColumnCount(initialColumnCount);
                setRowCount(initialRowCount);
                renderMainContent();
            }

            const getColumnName = (columnIndexZeroBased) => {
                const charCode = {
                    "A": 65,
                };
                const azLength = 26;
                let columnName = "";
                let currentIndexOneBased = (columnIndexZeroBased + 1);
                while (currentIndexOneBased > 0) {
                    const remainderZeroToTwentyFive = ((currentIndexOneBased - 1) % azLength);
                    const currentCharacter = String.fromCharCode(charCode["A"] + remainderZeroToTwentyFive);
                    columnName = `${currentCharacter}${columnName}`;
                    currentIndexOneBased = Math.floor((currentIndexOneBased - 1) / azLength);
                }
                return columnName;
            };

            const createHtmlElementEmptyContainer = (elementForPlusButtonToFindClass) => (WillyHorizont.UtilsWeb.htmlTemplateStringToHtmlElement(/*html*/`
                <div class="grid-table-cell ${elementForPlusButtonToFindClass}">
                </div>
            `));

            const createHtmlElementHeaderRowContainer = (columnIndexZeroBased) => (((columnName) => (WillyHorizont.UtilsWeb.htmlTemplateStringToHtmlElement(/*html*/`
                    <div class="grid-table-cell grid-table-sticky-header-row">
                        <input type="text" name="cell-header-input-${columnName}" autocomplete="off" value="${columnName}" />
                    </div>
                `)))(getColumnName(columnIndexZeroBased)));
            
            const createHtmlElementCellInputContainer = (rowIndexOneBased, columnIndexZeroBased) => (((columnName) => (WillyHorizont.UtilsWeb.htmlTemplateStringToHtmlElement(/*html*/`
                    <div class="grid-table-cell">
                        <input type="text" name="cell-input-${columnName}${rowIndexOneBased}" autocomplete="off" data-column-name="${columnName}" oninput="handleElementInputUpdateCurrentColumnScore('${columnName}')" />
                    </div>
                `)))(getColumnName(columnIndexZeroBased)));

            const createHtmlElementScoreColumnCell = (columnIndexZeroBased) => (WillyHorizont.UtilsWeb.htmlTemplateStringToHtmlElement(/*html*/`
                <div class="grid-table-cell score-row" data-current-column-score="${getColumnName(columnIndexZeroBased)}">
                    0
                </div>
            `));

            const appendHeaderRows = () => {
                const htmlElementGrid = document.getElementById("grid-table");
                
                htmlElementGrid.appendChild(WillyHorizont.UtilsWeb.htmlTemplateStringToHtmlElement(/*html*/`
                    <div class="grid-table-cell grid-table-corner grid-table-sticky-header-row">
                        #
                    </div>
                `));

                for (let columnIndexZeroBased = 0; (columnIndexZeroBased < getColumnCount()); columnIndexZeroBased += 1) {
                    htmlElementGrid.appendChild(createHtmlElementHeaderRowContainer(columnIndexZeroBased));
                }

                htmlElementGrid.appendChild(WillyHorizont.UtilsWeb.htmlTemplateStringToHtmlElement(/*html*/`
                    <div class="grid-table-cell grid-table-sticky-header-row add-button ${elementForPlusButtonToFindClassList['add-vertical-cell-plus-button']}" onclick="handleElementClickAddRowButton()">
                        +
                    </div>
                `));
            };

            const createHtmlElementNumberColumn = (rowIndexOneBased) => (WillyHorizont.UtilsWeb.htmlTemplateStringToHtmlElement(/*html*/`
                <div class="grid-table-cell grid-table-number-column">
                    ${rowIndexOneBased}
                </div>
            `));

            const appendDataRows = () => {
                const htmlElementGrid = document.getElementById("grid-table");

                for (let rowIndexOneBased = 1; (rowIndexOneBased <= getRowCount()); rowIndexOneBased += 1) {
                    htmlElementGrid.appendChild(createHtmlElementNumberColumn(rowIndexOneBased));

                    for (let columnIndexZeroBased = 0; (columnIndexZeroBased < getColumnCount()); columnIndexZeroBased += 1) {
                        htmlElementGrid.appendChild(createHtmlElementCellInputContainer(rowIndexOneBased, columnIndexZeroBased));
                    }

                    htmlElementGrid.appendChild(createHtmlElementEmptyContainer(elementForPlusButtonToFindClassList["vertical-blank-cells"]));
                }
            };

            const appendAddHorizontalCellRows = () => {
                const htmlElementGrid = document.getElementById("grid-table");

                htmlElementGrid.appendChild(WillyHorizont.UtilsWeb.htmlTemplateStringToHtmlElement(/*html*/`
                    <div class="grid-table-cell grid-table-number-column add-button ${elementForPlusButtonToFindClassList['add-horizontal-cell-plus-button']}" onclick="handleElementClickAddColumnButton(this)">
                        +
                    </div>
                `));

                for (let columnIndexZeroBased = 0; (columnIndexZeroBased < getColumnCount()); columnIndexZeroBased += 1) {
                    htmlElementGrid.appendChild(createHtmlElementEmptyContainer(elementForPlusButtonToFindClassList["horizontal-blank-cells"]));
                }

                htmlElementGrid.appendChild(createHtmlElementEmptyContainer(elementForPlusButtonToFindClassList["plus-button-joint-blank-cell"]));
            };

            const appendScoreRows = () => {
                const htmlElementGrid = document.getElementById("grid-table");

                htmlElementGrid.appendChild(WillyHorizont.UtilsWeb.htmlTemplateStringToHtmlElement(/*html*/`
                    <div class="grid-table-cell grid-table-number-column score-row">
                        Σ
                    </div>
                `));

                for (let columnIndexZeroBased = 0; (columnIndexZeroBased < getColumnCount()); columnIndexZeroBased += 1) {
                    htmlElementGrid.appendChild(createHtmlElementScoreColumnCell(columnIndexZeroBased));
                }

                htmlElementGrid.appendChild(WillyHorizont.UtilsWeb.htmlTemplateStringToHtmlElement(/*html*/`
                    <div class="grid-table-cell score-row ${elementForPlusButtonToFindClassList["score-rows-blank-cell"]}">
                        +
                    </div>
                `));
            };

            const resetGridTable = () => {
                const htmlElementGrid = document.getElementById("grid-table");
                htmlElementGrid.innerHTML = "";
                htmlElementGrid.style.setProperty("grid-template-columns", getStyleGridTemplateColumns());
            };

            function handleElementClickAddColumnButton(htmlElementAddHorizontalCellPlusButton) {
                setRowCount(getRowCount() + 1);

                const rowCount = getRowCount();
                // const columnCount = getColumnCount();
                // console.log({ columnName: getColumnName(columnCount), columnCount, rowCount, id: elementForPlusButtonToFindClassList["add-horizontal-cell-plus-button"] });
                
                const htmlElementGrid = document.getElementById("grid-table");

                const newRows = []

                newRows.push(createHtmlElementNumberColumn(rowCount));

                for (let columnIndexZeroBased = 0; (columnIndexZeroBased < htmlElementGrid.querySelectorAll(`[class~="${elementForPlusButtonToFindClassList['horizontal-blank-cells']}"]`).length); columnIndexZeroBased += 1) {
                    newRows.push(createHtmlElementCellInputContainer(rowCount, columnIndexZeroBased));
                }

                newRows.push(createHtmlElementEmptyContainer(elementForPlusButtonToFindClassList["vertical-blank-cells"]));

                // htmlElementGrid.querySelector(`[class~="${elementForPlusButtonToFindClassList['add-horizontal-cell-plus-button']}"]`).before(...newRows);
                htmlElementAddHorizontalCellPlusButton.before(...newRows);

                htmlElementGrid.style.setProperty("grid-template-columns", getStyleGridTemplateColumns());
            }

            function handleElementClickAddRowButton() {
                setColumnCount(getColumnCount() + 1);

                const columnCount = getColumnCount();
                // const rowCount = getRowCount();
                // console.log({ columnName: getColumnName(columnCount - 1), columnCount, rowCount, id: elementForPlusButtonToFindClassList["add-vertical-cell-plus-button"] });

                const htmlElementGrid = document.getElementById("grid-table");

                htmlElementGrid.insertBefore((createHtmlElementHeaderRowContainer(columnCount - 1)), (htmlElementGrid.querySelector(`[class~="${elementForPlusButtonToFindClassList['add-vertical-cell-plus-button']}"]`)));

                htmlElementGrid.querySelectorAll(`[class~="${elementForPlusButtonToFindClassList['vertical-blank-cells']}"]`).forEach((htmlElementDataRowEmptyColumn, rowIndexZeroBased) => {
                    htmlElementGrid.insertBefore((createHtmlElementCellInputContainer((rowIndexZeroBased + 1), (columnCount - 1))), (htmlElementDataRowEmptyColumn));
                });

                htmlElementGrid.insertBefore((createHtmlElementEmptyContainer(elementForPlusButtonToFindClassList["horizontal-blank-cells"])), (htmlElementGrid.querySelector(`[class~="${elementForPlusButtonToFindClassList['plus-button-joint-blank-cell']}"]`)));

                htmlElementGrid.insertBefore(createHtmlElementScoreColumnCell(columnCount - 1), htmlElementGrid.querySelector(`[class~="${elementForPlusButtonToFindClassList['score-rows-blank-cell']}"]`));
                
                htmlElementGrid.style.setProperty("grid-template-columns", getStyleGridTemplateColumns());
            }

            function handleElementInputUpdateCurrentColumnScore(columnName) {
                let currentCollumnScoreSummary = 0;

                const htmlElementCurrentColumnCellInputs = document.querySelectorAll(`input[data-column-name="${columnName}"]`);
                htmlElementCurrentColumnCellInputs.forEach((htmlElementCurrentColumnCellInput) => {
                    const htmlElementCurrentColumnCellInputValue = parseFloat(htmlElementCurrentColumnCellInput?.value);
                    if (WillyHorizont.Utils.checkIsNumeric(htmlElementCurrentColumnCellInputValue)) currentCollumnScoreSummary += htmlElementCurrentColumnCellInputValue;
                });

                const htmlElementScoreColumnCell = document.querySelector(`[data-current-column-score="${columnName}"]`);
                if (htmlElementScoreColumnCell) htmlElementScoreColumnCell.textContent = currentCollumnScoreSummary;
            }

            const renderMainContent = () => {
                resetGridTable();
                appendHeaderRows();
                appendDataRows();
                appendAddHorizontalCellRows();
                appendScoreRows();
            };

            renderMainContent();
        </script>
