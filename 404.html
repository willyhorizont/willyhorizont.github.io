<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../style.css" />
        <title>404 | Not Found | Willy Horizont</title>
    </head>
    <body>
        <main>
            <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; row-gap: 8px; background-color: var(--safe-background-color-1); color: var(--safe-text-color-1);">
                <h1 style="text-align: center;">404 | Not Found</h1>
                <p>Back to <a href="/"><span style="color: #0F7A71;">Home</span></a>.</p>
            </div>
        </main>
        <script>
            ((() => {
                const hrefList = [
                    { old: `${window.location.origin}/portfolio/kalender-libur-generator/`, new: `${window.location.origin}/portfolio/kalender-libur-advisor/` },
                    { old: `${window.location.origin}/portfolio/kalender-cuti-generator/`, new: `${window.location.origin}/portfolio/kalender-libur-advisor/` },
                ];
                if (!hrefList.some((href) => (window.location.href === href.old))) {
                    setTimeout(() => {
                        window.location.href = "/";
                    }, 5000);
                    return;
                }
                hrefList.forEach((href) => {
                    if (window.location.pathname === href.old) {
                        window.location.href = href.new;
                        return;
                    }
                });
            })());
        </script>
    </body>
</html>
