<!DOCTYPE html>
<html lang="en" spellcheck="false">
    <head>
        <script src="../requirement.js"></script>

        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="author" content="Willy Horizont" />
        <link rel="icon" type="image/x-icon" href="../favicon.ico" />
        <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png" />
        <link rel="icon" type="image/png" sizes="192x192" href="../android-chrome-192x192.png" />
        <link rel="icon" type="image/png" sizes="512x512" href="../android-chrome-512x512.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png" />

        <meta name="description" content="Unsupported Web Browser Detected" />
        <meta name="keywords" content="Unsupported Web Browser Detected" />
        <title>Unsupported Web Browser Detected | Willy Horizont</title>
    </head>
    <body style="margin: 0; background-color: #121212; color: #ddd;">
        <main>
            <h1 style="text-align: center; margin: 0; margin-top: 30vh;">Unsupported Web Browser Detected</h1>
            <h2 style="text-align: center;">⛔ Access Denied ⛔</h2>
            <p style="text-align: center;">Your <strong>web browser</strong> is not supported.</p>
            <p style="text-align: center;">Please use <strong>latest stable Google Chrome</strong> to continue.</p>
            <a href="https://www.google.com/chrome/" target="_blank" rel="noopener noreferrer" style="color:blue; display: block; text-align: center;">Download Chrome</a>
        </main>
        <script>
            (function () {
                getIsUserWebBrowserSupported();
            })();
        </script>
        <script>
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker.register("/sw.js").then((reg) => {
                        console.log("Service Worker registration success:", reg.scope);

                        reg.addEventListener("updatefound", () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener("statechange", () => {
                                if ((newWorker.state === "installed") && navigator.serviceWorker.controller) {
                                    alert("Website has been updated! The page will be reloaded to the newest version.");
                                    window.location.reload();
                                }
                            });
                        });
                    }).catch((err) => {
                        console.log("Service Worker registration failed:", err);
                    });
                });
            }
        </script>
    </body>
</html>
